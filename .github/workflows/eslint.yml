name: ESLint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: 
      - opened
      - synchronize
      - reopened
    

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: install dependencies
        run: npm install
      - name: run ESLint
        run: eslint . --ext .js,.jsx,.ts,.tsx,.astro